<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="minimum-scale=1, initial-scale=1, width=device-width"
    />
    <meta name="description" content="Moonshadow NVR - Intelligent Surveillance" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Moonshadow NVR</title>
    <style>
      /* Immediate black background to prevent white flashes */
      html, body {
        margin: 0;
        padding: 0;
        background-color: #000000 !important;
        color: #eeeeee;
        font-family: 'Inter', 'Roboto', sans-serif;
        overflow: hidden;
      }
      #root {
        background-color: #000000;
        min-height: 100vh;
      }
      /* Custom scrollbars for a premium feel */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #000; }
      ::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #333; }
      
      #initial-loader {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        background: #000; z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div style="color: #fff; font-family: monospace; letter-spacing: 2px; font-size: 0.8rem; border: 1px solid #333; padding: 10px 20px;">
        INITIALIZING MOONSHADOW STATION...
      </div>
    </div>
    <noscript>JavaScript is required to run this application.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        if (loader) setTimeout(() => { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 500); }, 500);
      });
    </script>
  </body>
</html>
